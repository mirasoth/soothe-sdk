name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: make sync-dev

      - name: Verify package import
        run: |
          uv run python -c "from soothe_sdk.protocols.core_agent import CoreAgentCapabilities; print('soothe-sdk OK')"

      - name: Format check
        run: make format-check

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit

      - name: Coverage
        if: matrix.python-version == '3.12'
        run: |
          uv run pytest tests/ --cov=soothe_sdk --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_integration.py

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: make sync-dev

      - name: Build package
        run: make build

      - name: Verify package
        run: |
          uv run twine check dist/*
          echo "Package built and verified"
